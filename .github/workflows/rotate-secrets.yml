name: Rotate Secrets

on:
  workflow_dispatch:

jobs:
  rotate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Write secrets and restart service
        env:
          SSH_KEY: ${{ secrets.ORACLE_VM_SSH_KEY }}
          HOST: ${{ secrets.OCI_HOST }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          echo "$SSH_KEY" > deploy_key.pem
          chmod 600 deploy_key.pem
          SSH_OPTS="-o StrictHostKeyChecking=no -i deploy_key.pem"

          ssh $SSH_OPTS opc@$HOST "printf 'JWT_SECRET=%s\nDB_PASSWORD=%s\n' '${JWT_SECRET}' '${DB_PASSWORD}' | sudo tee /etc/provisioncalculator.env > /dev/null && sudo chmod 600 /etc/provisioncalculator.env"

          ssh $SSH_OPTS opc@$HOST "sudo systemctl restart provisioncalculator"

          sleep 5
          ssh $SSH_OPTS opc@$HOST "systemctl is-active provisioncalculator"

      - name: Cleanup SSH key
        if: always()
        run: rm -f deploy_key.pem
