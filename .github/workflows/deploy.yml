name: Deploy on Release

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to deploy (e.g. v1.2.0)'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Download JAR from Release
        run: |
          TAG="${{ inputs.tag || github.event.workflow_run.head_branch }}"
          gh release download "$TAG" --pattern "*.jar" --dir . --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to OCI
        env:
          SSH_KEY: ${{ secrets.ORACLE_VM_SSH_KEY }}
          HOST: ${{ secrets.OCI_HOST }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          echo "$SSH_KEY" > deploy_key.pem
          chmod 600 deploy_key.pem
          SSH_OPTS="-o StrictHostKeyChecking=no -i deploy_key.pem"

          JAR_FILE=$(ls *.jar | head -1)

          scp $SSH_OPTS "$JAR_FILE" opc@$HOST:/opt/provisioncalculator/app.jar

          # Update PostgreSQL user password first, then write the env file,
          # so both are in sync before the service restarts.
          ssh $SSH_OPTS opc@$HOST "sudo -u postgres psql -c \"ALTER USER provision WITH PASSWORD '${DB_PASSWORD}';\""

          ssh $SSH_OPTS opc@$HOST "printf 'JWT_SECRET=%s\nDB_PASSWORD=%s\n' '${JWT_SECRET}' '${DB_PASSWORD}' | sudo tee /etc/provisioncalculator.env > /dev/null && sudo chmod 600 /etc/provisioncalculator.env"

          # Deploy Caddyfile to ensure routing config is up to date
          scp $SSH_OPTS Caddyfile opc@$HOST:/tmp/Caddyfile
          ssh $SSH_OPTS opc@$HOST "sudo mv /tmp/Caddyfile /etc/caddy/Caddyfile && sudo chown root:root /etc/caddy/Caddyfile && sudo restorecon -v /etc/caddy/Caddyfile"
          ssh $SSH_OPTS opc@$HOST "sudo systemctl reload caddy"

          ssh $SSH_OPTS opc@$HOST "sudo systemctl restart provisioncalculator"

          sleep 10
          ssh $SSH_OPTS opc@$HOST "systemctl is-active provisioncalculator"

      - name: Cleanup SSH key
        if: always()
        run: rm -f deploy_key.pem
