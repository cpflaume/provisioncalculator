name: Deploy on Release

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Download JAR from Release
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          gh release download "$TAG" --pattern "*.jar" --dir . --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to OCI
        env:
          SSH_KEY: ${{ secrets.ORACLE_VM_SSH_KEY }}
          HOST: ${{ secrets.OCI_HOST }}
        run: |
          echo "$SSH_KEY" > deploy_key.pem
          chmod 600 deploy_key.pem
          SSH_OPTS="-o StrictHostKeyChecking=no -i deploy_key.pem"

          JAR_FILE=$(ls *.jar | head -1)

          scp $SSH_OPTS "$JAR_FILE" opc@$HOST:/opt/provisioncalculator/app.jar

          ssh $SSH_OPTS opc@$HOST "sudo systemctl restart provisioncalculator"

          sleep 10
          ssh $SSH_OPTS opc@$HOST "systemctl is-active provisioncalculator"

      - name: Cleanup SSH key
        if: always()
        run: rm -f deploy_key.pem
