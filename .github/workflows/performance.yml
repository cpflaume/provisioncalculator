name: Performance Test

on:
  workflow_dispatch:

jobs:
  performance:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Performance Tests
        run: gradle performanceTest
        env:
          GRADLE_OPTS: "-Xmx3g"

      - name: Post Results to Job Summary
        if: always()
        run: |
          if [ -f build/performance-results.md ]; then
            cat build/performance-results.md >> $GITHUB_STEP_SUMMARY
          else
            echo "Performance results file not found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Performance Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-results
          path: build/performance-results.md

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-test-results
          path: build/test-results/performanceTest/*.xml
