server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/provisions
    username: provisions
    password: provisions
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 500
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-replace-in-production-must-be-at-least-32-bytes}
    expiration-ms: 86400000
    issuer: provisioncalculator
