server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/provisioncalculator
    username: provision
    password: ${DB_PASSWORD:provision_secret}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 500
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
